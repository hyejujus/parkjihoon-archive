<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ParkJiHoon Archive</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--green:#4CAF50;--green-lt:#E8F5E9;--yellow:#FFD600;--yellow-lt:#FFFDE7;--pink:#F06292;--pink-lt:#FCE4EC;--gray:#f5f5f5;--text:#222;--muted:#888;--hh:64px}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--gray);color:var(--text);min-height:100vh;overflow-x:hidden}
    .header{background:#000;height:var(--hh);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:50}
    .header-logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:#fff}
    .header-sub{font-size:11px;color:#aaa;letter-spacing:1px}
    .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-left:2px;vertical-align:middle}
    .tab-bar{background:#fff;border-bottom:1.5px solid #eee;display:flex;padding:0 24px;position:sticky;top:var(--hh);z-index:49}
    .tab-btn{padding:14px 20px;font-size:14px;font-weight:500;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:2.5px solid transparent;font-family:'Noto Sans KR',sans-serif;transition:all .18s}
    .tab-btn.active{color:var(--pink);border-bottom-color:var(--pink)}
    .tab-btn-bstage{color:#00b4d8;text-decoration:none}
    .tab-btn-bstage:hover{color:#0077b6;border-bottom-color:#00b4d8}
    .tab-panel{display:none}.tab-panel.active{display:block}
    .main{max-width:1100px;margin:0 auto;padding:28px 24px 60px}
    .main.wide{max-width:100%;padding:20px 40px 60px}
    .sec-title{font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
    .stat-box{background:#fff;border-radius:10px;border:1.5px solid #eee;padding:14px;text-align:center}
    .stat-num{font-size:24px;font-weight:700}
    .stat-lbl{font-size:11px;color:var(--muted);margin-top:2px}
    .c-green{color:var(--green)}.c-yellow{color:#c9a800}.c-pink{color:var(--pink)}
    .next-banner{background:linear-gradient(135deg,#e8f5e9 0%,#fffde7 50%,#fce4ec 100%);border-radius:16px;padding:22px 26px;margin-bottom:18px;color:#333;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;border:1.5px solid #b3d4f5;box-shadow:0 4px 18px rgba(100,170,240,.12)}
    .next-city{font-size:22px;font-weight:700;color:#222}
    .next-lbl{font-size:11px;letter-spacing:1px;color:var(--pink);font-weight:700;text-transform:uppercase;margin-bottom:4px}
    .cd-wrap{display:flex;gap:10px}
    .cd-box{text-align:center;background:#fff;border-radius:10px;padding:8px 14px;box-shadow:0 2px 8px rgba(0,0,0,.06);min-width:56px}
    .cd-num{font-family:'Bebas Neue',monospace;font-size:30px;line-height:1;color:var(--pink)}
    .cd-lbl{font-size:10px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin-top:2px}
    .schedule-grid{display:flex;flex-direction:column;gap:12px}
    .c-card{background:#fff;border-radius:14px;border:1.5px solid #eee;overflow:hidden;display:grid;grid-template-columns:8px 1fr auto;transition:transform .15s,box-shadow .15s}
    .c-card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.08)}
    .c-card.done{opacity:.6}.c-card.next-c{border-color:var(--green);box-shadow:0 0 0 2px rgba(76,175,80,.15)}
    .stripe{background:#ccc}
    .c-card.done .stripe{background:var(--green)}.c-card.next-c .stripe{background:var(--green)}
    .c-card.upcoming .stripe{background:var(--yellow)}.c-card.tba .stripe{background:#ddd}
    .c-body{padding:16px 18px}.c-meta{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
    .c-name{font-size:18px;font-weight:700}.flag{font-size:20px;line-height:1}
    .badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
    .badge.done{background:var(--green-lt);color:#2e7d32}.badge.next-c{background:var(--green-lt);color:#2e7d32}
    .badge.upcoming{background:var(--yellow-lt);color:#8a6e00}.badge.tba{background:#f3e5f5;color:#7b1fa2}
    .c-date{font-size:13px;color:var(--muted);margin-bottom:4px}.c-venue{font-size:13px;color:#444}
    .c-right{padding:16px 16px 16px 8px;display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-end;min-width:100px}
    .t-link{font-size:11px;background:var(--pink);color:#fff;padding:5px 12px;border-radius:20px;text-decoration:none;font-weight:500}
    .t-link:hover{opacity:.85}.t-sold{font-size:11px;color:var(--muted);font-weight:500;text-align:right}
    .div-past{display:flex;align-items:center;gap:10px;margin:8px 0 4px}
    .div-past::before,.div-past::after{content:'';flex:1;height:1px;background:#e0e0e0}
    .div-past span{font-size:11px;color:#bbb;letter-spacing:1px;white-space:nowrap}
    .cat-concert{--cat:#F06292;--cat-bg:#FCE4EC;--cat-tx:#880e4f}
    .cat-ticket{--cat:#7C4DFF;--cat-bg:#EDE7F6;--cat-tx:#4527a0}
    .cat-fansign{--cat:#4CAF50;--cat-bg:#E8F5E9;--cat-tx:#1b5e20}
    .cat-broadcast{--cat:#FFB300;--cat-bg:#FFF8E1;--cat-tx:#7a5100}
    .cat-drama{--cat:#00ACC1;--cat-bg:#E0F7FA;--cat-tx:#006064}
    .cat-media{--cat:#42A5F5;--cat-bg:#E3F2FD;--cat-tx:#0d47a1}
    .cat-other{--cat:#AB47BC;--cat-bg:#F3E5F5;--cat-tx:#4a148c}
    .cal-ctrl{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
    .cal-nav{display:flex;align-items:center;gap:10px}
    .cal-arrow{background:#fff;border:1.5px solid #e0e0e0;border-radius:8px;width:34px;height:34px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .cal-arrow:hover{background:#f5f5f5}
    .cal-mlabel{font-size:20px;font-weight:700;min-width:140px;text-align:center}
    .add-btn{background:#000;color:var(--yellow);border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
    .add-btn:hover{opacity:.85}
    .cat-legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
    .cat-chip{font-size:11px;font-weight:600;padding:4px 11px;border-radius:20px;background:var(--cat-bg);color:var(--cat-tx);border:1px solid var(--cat);cursor:pointer;transition:opacity .15s;user-select:none}
    .cat-chip.off{opacity:.3}
    /* 캘린더 좌우 분할 레이아웃 (목록 1 : 캘린더 3) */
    .cal-layout{display:grid;grid-template-columns:3fr 1fr;gap:20px;align-items:start}
    .cal-list-col{min-width:0}
    .cal-grid-col{min-width:0}

    .cal-wrap{background:#fff;border-radius:14px;border:1.5px solid #eee;overflow:hidden;margin-bottom:24px}
    .cal-wdays{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1.5px solid #eee;min-width:0;width:100%}
    .cal-wday{text-align:center;padding:10px 4px;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;border-right:1px solid #f0f0f0;box-sizing:border-box}
    .cal-wday:last-child{border-right:none}
    .cal-wday.sun{color:#e53935}.cal-wday.sat{color:#1e88e5}
    .cal-days{display:grid;grid-template-columns:repeat(7,1fr);min-width:0;width:100%}
    .cal-day{height:150px;border-right:1px solid #f0f0f0;border-bottom:1px solid #f0f0f0;padding:8px 7px 6px;cursor:pointer;transition:background .12s;overflow:visible;display:flex;flex-direction:column;position:relative;z-index:0;box-sizing:border-box;min-width:0}
    .cal-day:nth-child(7n){border-right:none}
    .cal-day:hover{background:#fafafa;z-index:1}
    .cal-day.other .dnum{color:#ccc}
    .cal-day.today .dnum{background:var(--pink);color:#fff !important;border-radius:50%}
    .dnum{font-size:13px;font-weight:500;color:#444;width:26px;height:26px;display:flex;align-items:center;justify-content:center;margin-bottom:4px;flex-shrink:0}
    .cal-day.sun-c .dnum{color:#e53935}.cal-day.sat-c .dnum{color:#1e88e5}
    .devts{display:flex;flex-direction:column;gap:2px;overflow:visible;flex:1;min-width:0;width:100%}
    .devt{font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:var(--cat-bg);color:var(--cat-tx);border-left:2.5px solid var(--cat);line-height:1.6;cursor:pointer;flex-shrink:0;position:relative;min-width:0;max-width:100%;box-sizing:border-box}
    .devt.range{border-left:none !important;border-radius:0;margin:0 -8px;padding:2px 6px;z-index:1;max-width:none;width:calc(100% + 16px)}
    .devt.range.rs{border-radius:4px 0 0 4px;margin-left:0;padding-left:6px;border-left:2.5px solid var(--cat) !important}
    .devt.range.re{border-radius:0 4px 4px 0;margin-right:0;padding-right:6px}
    .devt.solo{border-radius:4px;border-left:2.5px solid var(--cat) !important}
    .dmore{font-size:9px;color:var(--muted);padding-left:3px;flex-shrink:0;line-height:1.6;cursor:pointer}
    .list-items{display:flex;flex-direction:column;gap:8px;margin-bottom:28px}
    .litem{background:#fff;border-radius:10px;border:1.5px solid #eee;padding:12px 16px;display:flex;align-items:flex-start;gap:14px;transition:box-shadow .12s}
    .litem:hover{box-shadow:0 3px 12px rgba(0,0,0,.07)}
    .ldate-col{min-width:44px;text-align:center;flex-shrink:0}
    .lday-num{font-size:22px;font-weight:700;line-height:1}
    .lday-name{font-size:10px;color:var(--muted)}
    .lbody{flex:1;min-width:0;cursor:pointer}
    .ltitle{font-size:14px;font-weight:600;margin-bottom:3px}
    .lmeta{font-size:12px;color:var(--muted)}
    .lcat-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:var(--cat-bg);color:var(--cat-tx);margin-left:6px;vertical-align:middle}
    .lactions{display:flex;gap:6px;align-items:center;flex-shrink:0}
    .llink{font-size:11px;color:var(--green);text-decoration:none;font-weight:600}
    .llink:hover{text-decoration:underline}
    .ledit-btn{background:#e8f0fe;border:1px solid #a8c7fa;color:#1a73e8;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;padding:4px 8px}
    .ledit-btn:hover{background:#d2e3fc}
    .ldel-btn{background:#fff0f0;border:1px solid #ffcdd2;color:#e53935;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;padding:4px 8px}
    .ldel-btn:hover{background:#ffe0e0}
    .empty-msg{text-align:center;padding:32px;color:var(--muted);font-size:14px;line-height:2}
    .jump-btn{background:#000;color:var(--yellow);border:none;border-radius:8px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin:4px}
    .jump-btn.prev{background:#f5f5f5;color:#444}
    .img-thumb-wrap{position:relative;display:inline-block}
    .img-thumb{width:80px;height:80px;object-fit:cover;border-radius:8px;border:1.5px solid #eee;display:block}
    .img-thumb-del{position:absolute;top:-6px;right:-6px;width:18px;height:18px;background:#e53935;color:#fff;border:none;border-radius:50%;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .det-imgs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .det-img-thumb{width:72px;height:72px;object-fit:cover;border-radius:8px;border:1.5px solid #eee;cursor:pointer}
    .det-img-thumb:hover{opacity:.8}
    .img-lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:600;align-items:center;justify-content:center}
    .img-lightbox.open{display:flex}
    .img-lightbox img{max-width:92vw;max-height:88vh;border-radius:10px;object-fit:contain}
    .img-lb-close{position:absolute;top:16px;right:20px;color:#fff;font-size:32px;cursor:pointer;background:none;border:none}
    .mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);align-items:center;justify-content:center}
    .mo.open{display:flex}
    #mo-event{z-index:400}
    #mo-detail{z-index:400}
    #mo-day{z-index:400}
    .mo-box{background:#fff;border-radius:16px;padding:28px;width:min(480px,95vw);max-height:90vh;overflow-y:auto}
    .mo-box h3{font-size:16px;font-weight:700;margin-bottom:20px}
    .mo-lbl{font-size:12px;font-weight:600;color:var(--muted);display:block;margin:14px 0 5px}
    .mo-box input,.mo-box textarea,.mo-box select{width:100%;border:1.5px solid #e0e0e0;border-radius:8px;padding:9px 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;background:#fff;color:#222;transition:border-color .15s}
    .mo-box textarea{resize:vertical;min-height:60px}
    .mo-box input:focus,.mo-box textarea:focus,.mo-box select:focus{border-color:var(--pink)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .mo-btns{display:flex;gap:8px;margin-top:22px;justify-content:flex-end}
    .btn-cancel{background:#f5f5f5;border:none;border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
    .btn-save{background:var(--pink);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
    .det-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:16px}
    .det-title{font-size:18px;font-weight:700;line-height:1.3}
    .det-close-x{background:none;border:none;font-size:24px;cursor:pointer;color:#aaa;line-height:1;padding:0}
    .det-row{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;font-size:13px;color:#444}
    .det-icon{font-size:16px;flex-shrink:0}
    .btn-edit-det{flex:1;background:#e8f0fe;color:#1a73e8;border:1.5px solid #a8c7fa;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
    .btn-edit-det:hover{background:#d2e3fc}
    .btn-del-det{flex:1;background:#fce8e6;color:#c5221f;border:1.5px solid #f5b7b1;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
    .btn-del-det:hover{background:#fad2cf}
    @media(max-width:540px){
      /* 헤더 */
      .header{padding:0 14px;height:52px}
      :root{--hh:52px}
      .header-logo{font-size:20px;letter-spacing:1px}
      .header-sub{font-size:9px}

      /* 탭 */
      .tab-bar{padding:0 8px}
      .tab-btn{padding:11px 14px;font-size:13px}

      /* 본문 */
      .main{padding:16px 10px 60px;width:100%;max-width:100%;box-sizing:border-box}
      .main.wide{max-width:100%;padding:16px 10px 60px;width:100%;box-sizing:border-box}
      .sec-title{font-size:11px;margin-bottom:10px}

      /* 캘린더 레이아웃 - 모바일은 세로로 쌓기 (캘린더 위, 목록 아래) */
      .cal-layout{display:flex;flex-direction:column;gap:16px;width:100%;max-width:100%}
      .cal-grid-col{width:100%;max-width:100%;min-width:0;flex-shrink:1}
      .cal-list-col{width:100%;max-width:100%;min-width:0;flex-shrink:1}
      .cal-wrap{width:100%;max-width:100%;overflow-x:hidden}
      .cal-wdays,.cal-days{min-width:0}

      /* 통계 */
      .stats-row{gap:6px;margin-bottom:14px}
      .stat-box{padding:10px 6px;border-radius:8px}
      .stat-num{font-size:20px}
      .stat-lbl{font-size:10px}

      /* 다음공연 배너 */
      .next-banner{flex-direction:column;align-items:flex-start;padding:16px;gap:14px}
      .next-city{font-size:17px}
      .cd-wrap{gap:6px;width:100%}
      .cd-box{flex:1;padding:6px 4px;min-width:0}
      .cd-num{font-size:22px}
      .cd-lbl{font-size:9px}

      /* 콘서트 카드 */
      .c-card{grid-template-columns:6px 1fr auto}
      .c-body{padding:12px 10px}
      .c-name{font-size:14px}
      .c-date{font-size:11px}
      .c-venue{font-size:11px}
      .c-right{padding:10px 10px 10px 4px;min-width:72px}
      .t-link{font-size:10px;padding:4px 8px}
      .t-sold{font-size:10px}

      /* 캘린더 컨트롤 */
      .cal-ctrl{flex-wrap:nowrap;gap:6px}
      .cal-mlabel{font-size:15px;min-width:100px}
      .cal-arrow{width:28px;height:28px;font-size:15px}
      .add-btn{padding:7px 12px;font-size:12px;white-space:nowrap}

      /* 범례 */
      .cat-legend{gap:5px}
      .cat-chip{font-size:10px;padding:3px 8px}

      /* 캘린더 그리드 */
      .cal-wday{font-size:10px;padding:7px 2px}
      .cal-day{height:72px;padding:4px 3px 3px}
      .devt.range{margin:0 -3px;width:calc(100% + 6px)}
      .dnum{font-size:11px;width:20px;height:20px}
      .devt{font-size:9px;padding:1px 3px}
      .dmore{font-size:8px}
      .dmore{font-size:9px}

      /* 목록 */
      .litem{padding:10px 10px;gap:8px}
      .ldate-col{min-width:34px}
      .lday-num{font-size:18px}
      .lday-name{font-size:9px}
      .ltitle{font-size:13px}
      .lmeta{font-size:11px}
      .lcat-badge{font-size:9px;padding:1px 6px;margin-left:4px}
      .lactions{gap:4px}
      .ledit-btn,.ldel-btn{padding:3px 6px;font-size:11px}
      .llink{font-size:10px}

      /* 모달 */
      .mo-box{padding:20px 16px;width:min(95vw,420px);max-height:85vh}
      .mo-box h3{font-size:15px;margin-bottom:14px}
      .mo-lbl{font-size:11px;margin:10px 0 4px}
      .mo-box input,.mo-box textarea,.mo-box select{padding:8px 10px;font-size:13px}
      .form-row{grid-template-columns:1fr}
      .mo-btns{margin-top:16px;gap:6px}
      .btn-cancel,.btn-save{padding:10px 14px;font-size:13px}

      /* 상세 모달 */
      .det-title{font-size:15px}
      .det-row{font-size:12px;gap:8px}
      .btn-edit-det,.btn-del-det{padding:10px;font-size:13px}

      /* 이미지 */
      .img-thumb{width:64px;height:64px}
      .det-img-thumb{width:60px;height:60px}
    }
  </style>
</head>
<body>
<div class="header">
  <div style="flex:1">
    <div class="header-logo">PARK JI HOON <span class="dot"></span></div>
    <div class="header-sub">PARK JI HOON ARCHIVE</div>
  </div>
  <div id="sync-status" style="font-size:11px;color:#aaa;transition:opacity .5s;opacity:0;white-space:nowrap;padding-right:4px"></div>
</div>
<div class="tab-bar">
  <button class="tab-btn active" id="tbtn-schedule" onclick="switchTab('schedule')">콘서트 일정</button>
  <button class="tab-btn" id="tbtn-calendar" onclick="switchTab('calendar')">캘린더</button>
  <a class="tab-btn tab-btn-bstage" href="https://parkjihoon.bstage.in/" target="_blank" rel="noopener">비스테이지 ↗</a>
</div>
<div class="main">
  <div class="tab-panel active" id="tab-schedule">
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num c-green" id="st-done">0</div><div class="stat-lbl">완료</div></div>
      <div class="stat-box"><div class="stat-num c-yellow" id="st-upcoming">0</div><div class="stat-lbl">예정</div></div>
      <div class="stat-box"><div class="stat-num c-pink">11</div><div class="stat-lbl">전체 도시</div></div>
    </div>
    <div id="next-banner-wrap"></div>
    <div class="sec-title">전체 일정 · Full Schedule</div>
    <div class="schedule-grid" id="schedule-list"></div>
  </div>
  <div class="tab-panel" id="tab-calendar">
    <div class="cal-ctrl">
      <div class="cal-nav">
        <button class="cal-arrow" id="btn-prev">&#8249;</button>

<!-- 일정 추가/수정 모달 -->
<div class="mo" id="mo-event">
  <div class="mo-box">
    <h3 id="ev-modal-title">일정 추가</h3>
    <label class="mo-lbl">제목</label>
    <input id="ev-title" placeholder="예: 서울 팬사인회"/>
    <label class="mo-lbl">카테고리</label>
    <select id="ev-cat">
      <option value="concert">🎤 콘서트/공연/팬싸인회</option>
      <option value="ticket">🎟️ 예매 오픈</option>
      <!-- <option value="fansign">✍️ 팬사인회</option> -->
      <option value="broadcast">📺 드라마/영화/방송/유튜브</option>
      <!-- <option value="drama">🎬 드라마</option> -->
      <option value="media">📸 화보/미디어/광고</option>
      <option value="other">📌 기타</option>
    </select>
    <div class="form-row">
      <div><label class="mo-lbl">시작일</label><input type="date" id="ev-date"/></div>
      <div><label class="mo-lbl">종료일 <span style="font-weight:400;color:#aaa">(기간)</span></label><input type="date" id="ev-date-end"/></div>
    </div>
    <div class="form-row">
      <div><label class="mo-lbl">시작 시간 <span style="font-weight:400;color:#aaa">(선택)</span></label><input type="time" id="ev-time"/></div>
      <div><label class="mo-lbl">종료 시간 <span style="font-weight:400;color:#aaa">(선택)</span></label><input type="time" id="ev-time-end"/></div>
    </div>
    <label class="mo-lbl">장소 <span style="font-weight:400;color:#aaa">(선택)</span></label>
    <input id="ev-location" placeholder="예: KINTEX 제1전시장"/>
    <label class="mo-lbl">메모 <span style="font-weight:400;color:#aaa">(선택)</span></label>
    <textarea id="ev-note" placeholder="추가 정보를 입력하세요..."></textarea>
    <label class="mo-lbl">링크 <span style="font-weight:400;color:#aaa">(선택)</span></label>
    <input id="ev-link" placeholder="https://..."/>
    <label class="mo-lbl">이미지 <span style="font-weight:400;color:#aaa">(최대 3장)</span></label>
    <div id="img-upload-area" style="border:1.5px dashed #e0e0e0;border-radius:10px;padding:14px;text-align:center;cursor:pointer;background:#fafafa">
      <div id="img-placeholder" style="color:#aaa;font-size:13px">🖼️ 클릭하거나 드래그해서 이미지 추가</div>
      <div id="img-previews" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;justify-content:center"></div>
    </div>
    <input type="file" id="ev-images" accept="image/*" multiple style="display:none"/>
    <div class="mo-btns">
      <button class="btn-cancel" id="ev-cancel-btn">취소</button>
      <button class="btn-save" id="ev-save-btn">저장</button>
    </div>
  </div>
</div>

<!-- 상세 모달 -->
<div class="mo" id="mo-detail">
  <div class="mo-box">
    <div class="det-header">

      <button class="btn-del-det"  id="det-del-btn">🗑️ 삭제</button>
    </div>
  </div>
</div>

  /* ════════════════════════════
     Firebase Realtime Database 연동
  ════════════════════════════ */
  var FIREBASE_URL = 'https://jihoon-f54fc-default-rtdb.firebaseio.com/events.json';

  var evStore = [];
  var isSyncing = false;

  function showSyncStatus(msg, color) {
    var el = ge('sync-status');
    if (!el) return;
    el.textContent = msg;
    el.style.color = color || '#888';
    el.style.opacity = '1';
    if (msg !== '동기화 중…' && msg !== '저장 중…') {
      setTimeout(function() { el.style.opacity = '0'; }, 2000);
    }
  }

  /* Firebase에서 불러오기 */
  function loadFromCloud(cb) {
    showSyncStatus('동기화 중…', '#888');
    fetch(FIREBASE_URL)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        evStore = Array.isArray(data) ? data : [];
        showSyncStatus('✓ 동기화 완료', '#4CAF50');
        if (cb) cb();
      })
      .catch(function() {
        try { evStore = JSON.parse(localStorage.getItem('pjh_cal') || '[]'); } catch(e) { evStore = []; }
        showSyncStatus('⚠ 오프라인 모드', '#FFB300');
        if (cb) cb();
      });
  }

  /* Firebase에 저장 */
  function persist() {
    try { localStorage.setItem('pjh_cal', JSON.stringify(evStore)); } catch(e) {}
    if (isSyncing) return;
    isSyncing = true;
    showSyncStatus('저장 중…', '#888');
    fetch(FIREBASE_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(evStore)
    })
      .then(function(r) { return r.json(); })
      .then(function() {
        isSyncing = false;
        showSyncStatus('✓ 저장 완료', '#4CAF50');
      })
      .catch(function() {
        isSyncing = false;
        showSyncStatus('⚠ 저장 실패 (로컬 백업됨)', '#e53935');
      });
  }

  function allEvents() { return FIXED.concat(evStore); }

  /* ── 상태 ── */
  var today      = new Date();
  var calYear    = today.getFullYear();
  var calMonth   = today.getMonth();
  var activeCats = new Set(Object.keys(CATS));
  var editingId  = null;
  var detailId   = null;
  var pendingImages = [];

  /* ── 유틸 ── */
  function toDateStr(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function ge(id) { return document.getElementById(id); }

  /* ── 탭 전환 ── */
  window.switchTab = function(name) {
    ['schedule','calendar'].forEach(function(t) {
      ge('tab-' + t).classList.toggle('active', t === name);
      ge('tbtn-' + t).classList.toggle('active', t === name);
    });
    var main = document.querySelector('.main');
    if (name === 'calendar') {
      main.classList.add('wide');
    } else {
      main.classList.remove('wide');
    }
  };

  /* ════════════════════════════
     콘서트 일정
  ════════════════════════════ */
  function getNext() {
    var now = new Date();
    return CONCERTS.filter(function(c) { return c.ts >= now; }).sort(function(a,b) { return a.ts - b.ts; })[0];
  }

  function buildBanner() {
    var n = getNext();
    if (!n) return;
    ge('next-banner-wrap').innerHTML =
      '<div class="next-banner">' +
        '<div>' +
          '<div class="next-lbl">다음 공연</div>' +
          '<div class="next-city">' + n.flag + ' ' + n.city + '</div>' +
          '<div style="font-size:13px;color:#888;margin-top:4px">' + n.date + ' · ' + n.venue + '</div>' +
        '</div>' +
        '<div>' +
          '<div class="next-lbl" style="text-align:right;color:#4CAF50">D-DAY 카운트다운</div>' +
          '<div class="cd-wrap">' +
            '<div class="cd-box"><div class="cd-num" id="cd-d">--</div><div class="cd-lbl">Days</div></div>' +
            '<div class="cd-box"><div class="cd-num" id="cd-h">--</div><div class="cd-lbl">Hours</div></div>' +
            '<div class="cd-box"><div class="cd-num" id="cd-m">--</div><div class="cd-lbl">Min</div></div>' +
            '<div class="cd-box"><div class="cd-num" id="cd-s">--</div><div class="cd-lbl">Sec</div></div>' +
          '</div>' +
        '</div>' +
      '</div>';
    (function tick() {
      var diff = n.ts - new Date();
      if (diff <= 0) return;
      var el = ge('cd-d'); if (!el) return;
      el.textContent                = String(Math.floor(diff / 86400000)).padStart(2,'0');
      ge('cd-h').textContent = String(Math.floor(diff % 86400000 / 3600000)).padStart(2,'0');
      ge('cd-m').textContent = String(Math.floor(diff % 3600000 / 60000)).padStart(2,'0');
      ge('cd-s').textContent = String(Math.floor(diff % 60000 / 1000)).padStart(2,'0');
      setTimeout(tick, 1000);
    })();
  }

  function renderSchedule() {
    var now  = new Date();
    var next = getNext();
    var res  = CONCERTS.map(function(c) { return Object.assign({}, c, { eff: c.ts < now ? 'done' : c.status }); });
    var up   = res.filter(function(c) { return c.eff !== 'done'; }).sort(function(a,b) { return a.ts - b.ts; });
    var dn   = res.filter(function(c) { return c.eff === 'done'; }).sort(function(a,b) { return a.ts - b.ts; });
    ge('st-done').textContent     = dn.length;
    ge('st-upcoming').textContent = up.length;
    var sorted = up.concat(dn);
    var html = '';
    sorted.forEach(function(c, i) {
      var isN = next && c.city === next.city;
      var cls = isN ? 'next-c' : c.eff;
      if (i > 0 && c.eff === 'done' && sorted[i-1].eff !== 'done') {
        html += '<div class="div-past"><span>지난 공연</span></div>';
      }
      var btn = c.eff === 'done'
        ? '<span class="t-sold">판매완료</span>'
        : c.link
          ? '<a class="t-link" href="' + c.link + '" target="_blank">예매하기 ↗</a>'
          : '<span class="t-sold">예매 미정</span>';
      html +=
        '<div class="c-card ' + cls + '">' +
          '<div class="stripe"></div>' +
          '<div class="c-body">' +
            '<div class="c-meta">' +
              '<span class="flag">' + c.flag + '</span>' +
              '<span class="c-name">' + c.city + '</span>' +
              '<span class="badge ' + (isN ? 'next-c' : c.eff) + '">' + (isN ? 'NEXT' : SLABEL[c.eff]) + '</span>' +
            '</div>' +
            '<div class="c-date">' + c.date + ' · ' + c.time + '</div>' +
            '<div class="c-venue">' + c.venue + '</div>' +
          '</div>' +
          '<div class="c-right">' + btn + '</div>' +
        '</div>';
    });
    ge('schedule-list').innerHTML = html;
  }

  /* ════════════════════════════
     범례
  ════════════════════════════ */
  function renderLegend() {
    ge('cat-legend').innerHTML = Object.entries(CATS).map(function(entry) {
      var k = entry[0], v = entry[1];
      return '<span class="cat-chip cat-' + k + (activeCats.has(k) ? '' : ' off') + '" data-cat="' + k + '">' + v.icon + ' ' + v.label + '</span>';
    }).join('');
    ge('cat-legend').querySelectorAll('.cat-chip').forEach(function(chip) {
      chip.addEventListener('click', function() {
        var k = this.getAttribute('data-cat');
        if (activeCats.has(k)) { activeCats.delete(k); } else { activeCats.add(k); }
        renderLegend(); renderGrid(); renderList();
      });
    });
  }

  /* ════════════════════════════
     캘린더 그리드
  ════════════════════════════ */
  function evtsForDate(ds) {
    return allEvents().filter(function(e) {
      if (!activeCats.has(e.cat)) return false;
      var s = e.date;
      var en = e.dateEnd || e.date;
      return ds >= s && ds <= en;
    });
  }

  function renderGrid() {
    ge('cal-mlabel').textContent = calYear + '년 ' + MON_KO[calMonth];
    var first = new Date(calYear, calMonth, 1).getDay();
    var dim   = new Date(calYear, calMonth + 1, 0).getDate();
    var dip   = new Date(calYear, calMonth, 0).getDate();
    var tdStr = toDateStr(today);
    var total = Math.ceil((first + dim) / 7) * 7;
    var html  = '';

    for (var i = 0; i < total; i++) {
      var d, mo = calMonth, yr = calYear, other = false;
      if (i < first) {
        d = dip - first + i + 1; mo = calMonth - 1;
        if (mo < 0) { mo = 11; yr--; }
        other = true;
      } else if (i >= first + dim) {
        d = i - first - dim + 1; mo = calMonth + 1;
        if (mo > 11) { mo = 0; yr++; }
        other = true;
      } else {
        d = i - first + 1;
      }
      var ds  = yr + '-' + String(mo + 1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
      var col = i % 7;
      var cls = (other ? ' other' : '') + (ds === tdStr ? ' today' : '') + (col === 0 ? ' sun-c' : col === 6 ? ' sat-c' : '');
      var evts = evtsForDate(ds).sort(function(a, b) {
        var aRange = a.dateEnd && a.dateEnd !== a.date ? 1 : 0;
        var bRange = b.dateEnd && b.dateEnd !== b.date ? 1 : 0;
        if (aRange !== bRange) return aRange - bRange;
        // 같은 그룹 내에서는 시작일+id로 고정 정렬해서 모든 날짜에서 동일한 순서 유지
        var aKey = a.date + a.id;
        var bKey = b.date + b.id;
        return aKey.localeCompare(bKey);
      });
      var dots = evts.slice(0, 2).map(function(e) {
        var isRange = e.dateEnd && e.dateEnd !== e.date;
        var rc = '';
        if (isRange) {
          rc = ' range' + (ds === e.date ? ' rs' : ds === e.dateEnd ? ' re' : '');
        } else {
          rc = ' solo';
        }
        // 중간 날은 아이콘만, 시작/단일 날은 아이콘+제목 (최대 9자)
        var shortTitle = e.title.length > 9 ? e.title.slice(0, 9) + '…' : e.title;
        var lbl = (isRange && ds !== e.date) ? '&nbsp;' : CATS[e.cat].icon + ' ' + shortTitle;
        return '<div class="devt cat-' + e.cat + rc + '" data-id="' + e.id + '" title="' + e.title + '">' + lbl + '</div>';
      }).join('');
      var more = evts.length > 2 ? '<div class="dmore" data-date="' + ds + '">+' + (evts.length - 2) + '개 더</div>' : '';
      html += '<div class="cal-day' + cls + '" data-date="' + ds + '"><div class="dnum">' + d + '</div><div class="devts">' + dots + more + '</div></div>';
    }

    var container = ge('cal-days');
    container.innerHTML = html;

    container.querySelectorAll('.cal-day').forEach(function(el) {
      el.addEventListener('click', function(e) {
        if (e.target.classList.contains('devt') || e.target.classList.contains('dmore')) return;
        var ds = this.getAttribute('data-date');
        var dayEvts = evtsForDate(ds);
        if (dayEvts.length >= 3) {
          openDayModal(ds);
        } else {
          openAddModal(ds);
        }
      });
    });
    container.querySelectorAll('.dmore').forEach(function(el) {
      el.addEventListener('click', function(e) {
        e.stopPropagation();
        openDayModal(this.getAttribute('data-date'));
      });
    });
    container.querySelectorAll('.devt').forEach(function(el) {
      el.addEventListener('click', function(e) {
        e.stopPropagation();
        openDetail(this.getAttribute('data-id'));
      });
    });
  }

  /* ════════════════════════════
     날짜별 일정 모달
  ════════════════════════════ */
  var dayModalDate = null;

  function openDayModal(ds) {
    dayModalDate = ds;
    var d    = new Date(ds + 'T00:00:00');
    var title = d.getFullYear() + '년 ' + (d.getMonth()+1) + '월 ' + d.getDate() + '일 ' + DAY_KO[d.getDay()] + '요일';
    ge('day-modal-title').textContent = '📅 ' + title;

    var evts = evtsForDate(ds).sort(function(a,b) {
      return (a.time||'').localeCompare(b.time||'');
    });

    var html = '<div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">';
    evts.forEach(function(e) {
      var timeLabel = e.time ? (e.timeEnd ? e.time + ' ~ ' + e.timeEnd : e.time) : '';
      var isRange   = e.dateEnd && e.dateEnd !== e.date;
      html +=
        '<div style="background:#f9f9f9;border-radius:10px;padding:12px 14px;border-left:3px solid var(--cat);display:flex;align-items:center;gap:10px;cursor:pointer" class="cat-' + e.cat + '" data-id="' + e.id + '">' +
          '<span style="font-size:18px">' + CATS[e.cat].icon + '</span>' +
          '<div style="flex:1;min-width:0">' +
            '<div style="font-size:13px;font-weight:700;color:#222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + e.title + '</div>' +
            '<div style="font-size:11px;color:#888;margin-top:2px">' +
              (timeLabel ? timeLabel + (e.location ? ' · ' + e.location : '') : (e.location || '')) +
              (isRange ? '<span style="margin-left:6px;font-size:10px;background:var(--pink-lt);color:var(--pink);padding:1px 6px;border-radius:8px;font-weight:600">기간</span>' : '') +
            '</div>' +
          '</div>' +
          '<span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--cat-bg);color:var(--cat-tx);flex-shrink:0">' + CATS[e.cat].label + '</span>' +
        '</div>';
    });
    html += '</div>';

    ge('day-modal-body').innerHTML = html;

    // 각 일정 클릭 → 상세 모달
    ge('day-modal-body').querySelectorAll('[data-id]').forEach(function(el) {
      el.addEventListener('click', function() {
        ge('mo-day').classList.remove('open');
        openDetail(this.getAttribute('data-id'));
      });
    });

    ge('mo-day').classList.add('open');
  }

  /* ════════════════════════════
     이달 목록
  ════════════════════════════ */
  function renderList() {
    var mStart = calYear + '-' + String(calMonth + 1).padStart(2,'0') + '-01';
    var mEnd   = calYear + '-' + String(calMonth + 1).padStart(2,'0') + '-' + String(new Date(calYear, calMonth + 1, 0).getDate()).padStart(2,'0');
    var todayStr = toDateStr(today);
    var seen   = {};
    var evts   = allEvents()
      .filter(function(e) {
        if (!activeCats.has(e.cat)) return false;
        var s = e.date;
        var en = e.dateEnd || e.date;
        return s <= mEnd && en >= mStart;
      })
      .filter(function(e) {
        if (seen[e.id]) return false;
        seen[e.id] = true;
        return true;
      })
      .sort(function(a,b) {
        // 오늘 이후(또는 오늘 포함) 일정 그룹을 먼저, 지난 일정 그룹을 나중에
        var aFuture = (a.dateEnd || a.date) >= todayStr;
        var bFuture = (b.dateEnd || b.date) >= todayStr;
        if (aFuture !== bFuture) return aFuture ? -1 : 1;
        // 같은 그룹 내에서는 날짜/시간 오름차순
        return a.date.localeCompare(b.date) || (a.time || '').localeCompare(b.time || '');
      });

    if (!evts.length) {
      var allSorted = allEvents()
        .filter(function(e) { return activeCats.has(e.cat); })
        .sort(function(a,b) { return a.date.localeCompare(b.date); });
      var nextEvt = null, prevEvt = null;
      for (var i = 0; i < allSorted.length; i++) {
        if (allSorted[i].date > mEnd && !nextEvt) { nextEvt = allSorted[i]; }
        if (allSorted[i].date < mStart) { prevEvt = allSorted[i]; }
      }
      var btns = '';
      if (nextEvt) {
        var np = nextEvt.date.split('-');
        var ny = parseInt(np[0]), nm = parseInt(np[1]) - 1;
        btns += '<button class="jump-btn" id="jump-next">다음 일정 → ' + ny + '년 ' + (nm+1) + '월</button>';
      }
      if (prevEvt) {
        var pp = prevEvt.date.split('-');
        var py = parseInt(pp[0]), pm = parseInt(pp[1]) - 1;
        btns += '<button class="jump-btn prev" id="jump-prev">← 이전 일정 ' + py + '년 ' + (pm+1) + '월</button>';
      }
      ge('cal-list').innerHTML = '<div class="empty-msg">이달 등록된 일정이 없어요.<br><span style="font-size:12px;color:#bbb">다른 달로 이동해보세요</span><br>' + btns + '</div>';
      if (nextEvt) {
        var np2 = nextEvt.date.split('-');
        ge('jump-next').addEventListener('click', function() {
          calYear = parseInt(np2[0]); calMonth = parseInt(np2[1]) - 1;
          renderGrid(); renderList();
        });
      }
      if (prevEvt) {
        var pp2 = prevEvt.date.split('-');
        ge('jump-prev').addEventListener('click', function() {
          calYear = parseInt(pp2[0]); calMonth = parseInt(pp2[1]) - 1;
          renderGrid(); renderList();
        });
      }
      return;
    }

    var html = '<div class="list-items">';
    evts.forEach(function(e) {
      var dd       = new Date(e.date + 'T00:00:00');
      var isRange  = e.dateEnd && e.dateEnd !== e.date;
      var dateLabel = isRange ? e.date + ' ~ ' + e.dateEnd : e.date;
      var timeLabel = e.time ? (e.timeEnd ? e.time + ' ~ ' + e.timeEnd : e.time) : '';
      html +=
        '<div class="litem">' +
          '<div class="ldate-col">' +
            '<div class="lday-num">' + dd.getDate() + '</div>' +
            '<div class="lday-name">' + DAY_KO[dd.getDay()] + '요일</div>' +
            (isRange ? '<div style="font-size:9px;color:var(--pink);margin-top:2px;font-weight:700">기간</div>' : '') +
          '</div>' +
          '<div class="lbody" data-id="' + e.id + '">' +
            '<div class="ltitle">' + CATS[e.cat].icon + ' ' + e.title + '<span class="lcat-badge cat-' + e.cat + '">' + CATS[e.cat].label + '</span></div>' +
            '<div class="lmeta">' + dateLabel + (timeLabel ? ' · ' + timeLabel : '') + (e.location ? ' · ' + e.location : '') + (e.note ? '<br><span style="color:#aaa">' + e.note + '</span>' : '') + '</div>' +
          '</div>' +
          '<div class="lactions">' +
            (e.link ? '<a class="llink" href="' + e.link + '" target="_blank">링크 ↗</a>' : '') +
            '<button class="ledit-btn" data-id="' + e.id + '">✏️</button>' +
            '<button class="ldel-btn"  data-id="' + e.id + '">🗑️</button>' +
          '</div>' +
        '</div>';
    });
    html += '</div>';
    ge('cal-list').innerHTML = html;

    ge('cal-list').querySelectorAll('.lbody[data-id]').forEach(function(el) {
      el.addEventListener('click', function() { openDetail(this.getAttribute('data-id')); });
    });
    ge('cal-list').querySelectorAll('.ledit-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id = this.getAttribute('data-id');
        var ev = allEvents().find(function(e) { return e.id === id; });
        if (!ev) return;
        if (ev.fixed) {
          var copy = Object.assign({}, ev, { id: String(Date.now()), fixed: false });
          fillEditModal(copy, true);
        } else {
          fillEditModal(ev, false);
        }
      });
    });
    ge('cal-list').querySelectorAll('.ldel-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id = this.getAttribute('data-id');
        var ev = allEvents().find(function(e) { return e.id === id; });
        if (!ev) return;
        reqPw(function() {
          if (!confirm('"' + ev.title + '" 일정을 삭제할까요?')) return;
          if (ev.fixed) {
            var idx = FIXED.findIndex(function(e) { return e.id === id; });
            if (idx !== -1) FIXED.splice(idx, 1);
          } else {
            evStore = evStore.filter(function(e) { return e.id !== id; });
            persist();
          }
          renderGrid(); renderList();
        });
      });
    });
  }

  ge('btn-prev').addEventListener('click', function() {
    calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; }
    renderGrid(); renderList();
  });
  ge('btn-next').addEventListener('click', function() {
    calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; }
    renderGrid(); renderList();
  });

  /* ════════════════════════════
     비밀번호 없이 바로 실행
  ════════════════════════════ */
  function reqPw(cb) {
    if (cb) cb();
  }

  /* ════════════════════════════
     이미지
  ════════════════════════════ */
  function renderImgPreviews() {
    var wrap = ge('img-previews');
    var ph   = ge('img-placeholder');
    ph.style.display = pendingImages.length >= 3 ? 'none' : 'block';
    ph.textContent   = pendingImages.length >= 3 ? '' : '🖼️ 클릭하거나 드래그해서 이미지 추가 (최대 3장)';
    wrap.innerHTML = pendingImages.map(function(src, i) {
      return '<div class="img-thumb-wrap"><img class="img-thumb" src="' + src + '"/><button class="img-thumb-del" data-i="' + i + '">×</button></div>';
    }).join('');
    wrap.querySelectorAll('.img-thumb-del').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        pendingImages.splice(parseInt(this.getAttribute('data-i')), 1);
        renderImgPreviews();
      });
    });
  }
  ge('img-upload-area').addEventListener('click', function() { ge('ev-images').click(); });
  ge('ev-images').addEventListener('change', function() {
    var rem = 3 - pendingImages.length;
    Array.from(this.files).slice(0, rem).forEach(function(f) {
      var r = new FileReader();
      r.onload = function(ev) { pendingImages.push(ev.target.result); renderImgPreviews(); };
      r.readAsDataURL(f);
    });
    this.value = '';
  });
  ge('img-upload-area').addEventListener('dragover', function(e) { e.preventDefault(); this.style.borderColor = '#F06292'; });
  ge('img-upload-area').addEventListener('dragleave', function() { this.style.borderColor = '#e0e0e0'; });
  ge('img-upload-area').addEventListener('drop', function(e) {
    e.preventDefault(); this.style.borderColor = '#e0e0e0';
    var rem = 3 - pendingImages.length;
    Array.from(e.dataTransfer.files).filter(function(f) { return f.type.startsWith('image/'); }).slice(0, rem).forEach(function(f) {
      var r = new FileReader();
      r.onload = function(ev) { pendingImages.push(ev.target.result); renderImgPreviews(); };
      r.readAsDataURL(f);
    });
  });

  /* ── 라이트박스 ── */
  ge('lb-close').addEventListener('click', function() { ge('lightbox').classList.remove('open'); });
  ge('lightbox').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('open'); });
  function openLightbox(src) { ge('lb-img').src = src; ge('lightbox').classList.add('open'); }

  /* 날짜 모달 닫기 */
  ge('day-close-btn').addEventListener('click', function() { ge('mo-day').classList.remove('open'); });
  ge('mo-day').addEventListener('click', function(e) { if (e.target === this) this.classList.remove('open'); });
  ge('day-add-btn').addEventListener('click', function() {
    ge('mo-day').classList.remove('open');
    openAddModal(dayModalDate);
  });

  /* ════════════════════════════
     일정 추가/수정 모달 공통 폼 채우기
  ════════════════════════════ */
  function fillEventForm(ev) {
    ge('ev-title').value    = ev ? ev.title    : '';
    ge('ev-cat').value      = ev ? ev.cat      : 'concert';
    ge('ev-date').value     = ev ? ev.date     : toDateStr(today);
    ge('ev-date-end').value = ev ? (ev.dateEnd  || '') : '';
    ge('ev-time').value     = ev ? (ev.time     || '') : '';
    ge('ev-time-end').value = ev ? (ev.timeEnd  || '') : '';
    ge('ev-location').value = ev ? (ev.location || '') : '';
    ge('ev-note').value     = ev ? (ev.note     || '') : '';
    ge('ev-link').value     = ev ? (ev.link     || '') : '';
    ge('ev-images').value   = '';
    pendingImages = ev ? (ev.images || []).slice() : [];
    renderImgPreviews();
  }

  function openAddModal(dateStr) {
    reqPw(function() {
      editingId = null;
      ge('ev-modal-title').textContent = '일정 추가';
      fillEventForm(null);
      if (dateStr) ge('ev-date').value = dateStr;
      ge('mo-event').classList.add('open');
      setTimeout(function() { ge('ev-title').focus(); }, 80);
    });
  }

  function fillEditModal(ev, isNewFromFixed) {
    reqPw(function() {
      editingId = isNewFromFixed ? null : ev.id;
      ge('ev-modal-title').textContent = '일정 수정';
      fillEventForm(ev);
      ge('ev-save-btn').setAttribute('data-fixed-origin', isNewFromFixed ? detailId : '');
      ge('mo-detail').classList.remove('open'); // 상세 모달 닫기
      ge('mo-event').classList.add('open');
      setTimeout(function() { ge('ev-title').focus(); }, 80);
    });
  }

  ge('btn-add-event').addEventListener('click', function() { openAddModal(null); });
  ge('ev-cancel-btn').addEventListener('click', function() {
    ge('mo-event').classList.remove('open');
    ge('ev-save-btn').setAttribute('data-fixed-origin', '');
    editingId = null;
  });
  ge('ev-save-btn').addEventListener('click', function() {
    var title   = ge('ev-title').value.trim();
    var date    = ge('ev-date').value;
    var dateEnd = ge('ev-date-end').value;
    if (!title) { alert('제목을 입력해주세요!'); return; }
    if (!date)  { alert('시작일을 선택해주세요!'); return; }
    if (dateEnd && dateEnd < date) { alert('종료일은 시작일 이후여야 해요!'); return; }
    var ev = {
      id:       editingId || String(Date.now()),
      title:    title,
      cat:      ge('ev-cat').value,
      date:     date,
      dateEnd:  dateEnd || '',
      time:     ge('ev-time').value,
      timeEnd:  ge('ev-time-end').value,
      location: ge('ev-location').value.trim(),
      note:     ge('ev-note').value.trim(),
      link:     ge('ev-link').value.trim(),
      images:   pendingImages.slice()
    };
    if (editingId) {
      evStore = evStore.map(function(e) { return e.id === editingId ? ev : e; });
    } else {
      // 고정 일정 수정인 경우 FIXED에서 원본 제거 후 evStore에 추가
      var fixedOriginId = ge('ev-save-btn').getAttribute('data-fixed-origin');
      if (fixedOriginId) {
        var origIdx = FIXED.findIndex(function(e) { return e.id === fixedOriginId; });
        if (origIdx !== -1) FIXED.splice(origIdx, 1);
        ge('ev-save-btn').setAttribute('data-fixed-origin', '');
      }
      evStore.push(ev);
    }
    persist();
    ge('mo-event').classList.remove('open');
    editingId = null;
    var p = date.split('-');
    calYear = parseInt(p[0]); calMonth = parseInt(p[1]) - 1;
    renderGrid(); renderList();
  });

  /* ════════════════════════════
     상세 모달
  ════════════════════════════ */
  function openDetail(id) {
    var e = allEvents().find(function(ev) { return ev.id === id; });
    if (!e) return;
    detailId = id;
    ge('det-title').textContent = CATS[e.cat].icon + ' ' + e.title;
    var imgs = '';
    if (e.images && e.images.length) {
      imgs = '<div class="det-imgs">' + e.images.map(function(s) {
        return '<img class="det-img-thumb" src="' + s + '" data-src="' + s + '"/>';
      }).join('') + '</div>';
    }
    var dl = (e.dateEnd && e.dateEnd !== e.date) ? e.date + ' ~ ' + e.dateEnd : e.date;
    var tl = e.time ? (e.timeEnd ? e.time + ' ~ ' + e.timeEnd : e.time) : '';
    ge('det-body').innerHTML =
      imgs +
      '<div class="det-row"><span class="det-icon">📅</span><span>' + dl + (tl ? ' · ' + tl : '') + '</span></div>' +
      (e.location ? '<div class="det-row"><span class="det-icon">📍</span><span>' + e.location + '</span></div>' : '') +
      (e.note     ? '<div class="det-row"><span class="det-icon">📝</span><span>' + e.note + '</span></div>'     : '') +
      (e.link     ? '<div class="det-row"><span class="det-icon">🔗</span><a class="llink" href="' + e.link + '" target="_blank">' + e.link + '</a></div>' : '') +
      '<div class="det-row"><span class="lcat-badge cat-' + e.cat + '" style="margin-left:0">' + CATS[e.cat].label + '</span></div>';

    ge('det-body').querySelectorAll('.det-img-thumb').forEach(function(img) {
      img.addEventListener('click', function() { openLightbox(this.getAttribute('data-src')); });
    });

    /* 수정/삭제 버튼 - 모든 일정에 표시 */
    var actionWrap = ge('det-action-wrap');
    actionWrap.style.cssText = 'display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid #eee';

    ge('mo-detail').classList.add('open');
  }

  ge('det-close-btn').addEventListener('click', function() { ge('mo-detail').classList.remove('open'); });

  ge('det-edit-btn').addEventListener('click', function() {
    var ev = allEvents().find(function(e) { return e.id === detailId; });
    if (!ev) return;
    // 고정 일정은 복사본을 evStore에 넣어 수정
    if (ev.fixed) {
      var copy = Object.assign({}, ev, { id: String(Date.now()), fixed: false });
      fillEditModal(copy, true); // true = isNewFromFixed
    } else {
      fillEditModal(ev, false);
    }
  });

  ge('det-del-btn').addEventListener('click', function() {
    var ev = allEvents().find(function(e) { return e.id === detailId; });
    if (!ev) return;
    reqPw(function() {
      if (!confirm('"' + ev.title + '" 일정을 삭제할까요?')) return;
      if (ev.fixed) {
        // FIXED 배열에서 제거
        var idx = FIXED.findIndex(function(e) { return e.id === detailId; });
        if (idx !== -1) FIXED.splice(idx, 1);
      } else {
        evStore = evStore.filter(function(e) { return e.id !== detailId; });
        persist();
      }
      ge('mo-detail').classList.remove('open');
      renderGrid(); renderList();
    });
  });

  /* ════════════════════════════
     초기 렌더
  ════════════════════════════ */
  buildBanner();
  renderSchedule();
  renderLegend();

  /* 클라우드에서 불러온 뒤 캘린더 렌더 */
  loadFromCloud(function() {
    /* 가장 가까운 예정 일정 달로 시작 */
    var nowStr = toDateStr(today).slice(0, 7);
    var futureFixed = FIXED.filter(function(e) { return e.date >= nowStr + '-01'; })
      .sort(function(a,b) { return a.date.localeCompare(b.date); });
    if (futureFixed.length) {
      var fp = futureFixed[0].date.split('-');
      calYear = parseInt(fp[0]); calMonth = parseInt(fp[1]) - 1;
    }
    renderGrid();
    renderList();
  });

})();
</script>
</body>
</html>
